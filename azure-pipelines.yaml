trigger:
  paths:
    include:
      - terraform/**
  branches:
    include:
      - main

stages:

- stage: Terraform
  displayName: 'Provision Infrastructure'
  jobs:
  - job: Terraform_Apply
    displayName: 'Terraform Destroy & Apply'
    pool:
      name: 'Ally CICD azure'

    steps:

    - task: DownloadSecureFile@1
      name: download_ssh_key
      inputs:
        secureFile: 'test_rsa.pub'

    - script: |
        echo "Copying SSH public key into Terraform module"

        mkdir -p ~/.ssh
        cp $(download_ssh_key.secureFilePath) ~/.ssh/test_rsa.pub

        cp $(download_ssh_key.secureFilePath) terraform/modules/compute/test_rsa.pub

        echo "Listing contents of terraform/modules/compute/"
        ls -al terraform/modules/compute/
      displayName: 'Extract SSH Public Key for Terraform'

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'AzureCiCD'
        scriptType: bash
        scriptLocation: inlineScript
        workingDirectory: $(System.DefaultWorkingDirectory)/terraform
        inlineScript: |
          echo "##[group]Terraform Init"

          terraform init -input=false

          echo "##[endgroup]"

          echo "##[group]Terraform Destroy (safe)"

          terraform destroy -auto-approve -var-file="envs/dev.tfvars" || true

          echo "##[endgroup]"

          echo "##[group]Terraform Plan"

          terraform plan -input=false -var-file="envs/dev.tfvars"

          echo "##[endgroup]"

          echo "##[group]Terraform Apply"

          terraform apply -input=false -auto-approve -var-file="envs/dev.tfvars"

          echo "##[endgroup]"